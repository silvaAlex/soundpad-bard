name: CI/CD Soundpad - Bard Minstrel

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build (Debug)
        run: cargo build --verbose

      - name: Build (Release)
        run: cargo build --release --verbose

      - name: Upload Release Binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: soundpad-bard-linux
          path: target/release/soundpad_bard

      - name: Upload Release Binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: soundpad-bard-windows
          path: target/release/soundpad_bard.exe